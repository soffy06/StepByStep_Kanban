<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a706ec"/>
      <stop offset="100%" stop-color="#360342"/>
    </linearGradient>
  </defs>
  
  <rect width="200" height="200" rx="30" fill="url(#grad)"/>
  
  <!-- Grupo del cohete girado 20 grados desde el centro -->
  <g transform="rotate(30, 50, 50)">
    <!-- Cuerpo del cohete -->
    <path d="M50 15 L65 55 L50 75 L35 55 Z" fill="white" opacity="0.9"/>
    
    <!-- Punta (triángulo superior) -->
    <path d="M50 15 L42 30 L58 30 Z" fill="#f30a0a"/>
    
    <!-- Ventana -->
    <circle cx="50" cy="45" r="6" fill="#000811" stroke="white" stroke-width="2"/>
    
    <!-- Aletas -->
    <path d="M35 55 L25 70 L35 65 Z" fill="#FF6B6B"/>
    <path d="M65 55 L75 70 L65 65 Z" fill="#ffae6b"/>
    
    <!-- Fuego -->
    <path d="M50 75 L40 90 L50 85 L60 90 Z" fill="#f37209"/>
    <path d="M46 75 L43 88 L50 83 L57 88 L54 75" fill="#FF6B6B" opacity="0.7"/>
  </g>
</svg>